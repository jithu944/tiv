<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ultimate Tic Tac Toe | Futuristic Duel</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* particle canvas */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* main container */
        .game-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 620px;
            margin: auto;
            background: rgba(10, 20, 30, 0.55);
            backdrop-filter: blur(4px);
            border-radius: 64px;
            padding: 20px 16px 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(0, 255, 255, 0.15);
            transition: all 0.3s ease;
        }

        /* themes */
        body[data-theme="neon-blue"] .glow-text { text-shadow: 0 0 8px #0ff, 0 0 2px #0ff; }
        body[data-theme="neon-green"] .glow-text { text-shadow: 0 0 8px #0f6, 0 0 2px #0f6; }
        body[data-theme="purple"] .glow-text { text-shadow: 0 0 8px #c084fc, 0 0 2px #b77cff; }
        body[data-theme="neon-blue"] .cell { box-shadow: 0 0 0 1px #0ff3, 0 0 0 2px #0ff1; }
        body[data-theme="neon-green"] .cell { box-shadow: 0 0 0 1px #0f63, 0 0 0 2px #0f61; }
        body[data-theme="purple"] .cell { box-shadow: 0 0 0 1px #c084fc3a, 0 0 0 2px #c084fc1a; }

        /* start menu */
        .menu-screen, .game-screen, .end-screen {
            transition: opacity 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .hidden {
            display: none !important;
        }
        .title {
            font-size: 2.5rem;
            font-weight: 800;
            text-align: center;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ffffff, #88ddff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 24px;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
            margin: 20px 0;
        }
        .btn {
            background: rgba(0, 20, 40, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 255, 0.5);
            padding: 12px 22px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            color: #eef5ff;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary {
 background: linear-gradient(135deg, #0ff2a, #0af);
            border-color: #0ff;
            box-shadow: 0 0 10px #0ff6;
            color: white;
        }
        .btn-active {
            background: linear-gradient(135deg, #0af, #0ff);
            border-color: #fff;
            box-shadow: 0 0 15px cyan;
            transform: scale(1.02);
        }
        select, .difficulty-selector {
            background: #0a1428;
            border: 1px solid cyan;
            border-radius: 40px;
            padding: 10px 16px;
            color: white;
            font-weight: bold;
        }
        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 48px;
            padding: 16px;
            margin: 20px 0;
        }
        .cell {
            aspect-ratio: 1 / 1;
            background: rgba(10, 20, 32, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: 700;
            transition: 0.1s linear;
            cursor: pointer;
            color: white;
            text-shadow: 0 0 12px cyan;
            box-shadow: 0 0 0 1px cyan, inset 0 0 10px rgba(0,255,255,0.1);
        }
        .cell.x-move { color: #0ff; text-shadow: 0 0 20px #0ff; animation: pop 0.2s ease; }
        .cell.o-move { color: #f3a683; text-shadow: 0 0 20px #ffb347; animation: pop 0.2s ease; }
        @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .info-panel {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 16px;
            border-radius: 60px;
            backdrop-filter: blur(8px);
        }
        .badge {
            background: rgba(0, 20, 40, 0.9);
            border-radius: 60px;
            padding: 8px 16px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 4px rgba(0,255,255,0.5);
            border: 1px solid rgba(0, 255, 255, 0.3);
            font-size: 0.9rem;
        }
        .history-panel {
            max-height: 140px;
            overflow-y: auto;
            background: #030b1466;
            border-radius: 24px;
            padding: 12px;
            font-size: 0.8rem;
            color: #ccf;
            font-weight: 500;
            margin-top: 12px;
        }
        .stat-grid {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: space-between;
            background: rgba(0,0,0,0.5);
            padding: 12px;
            border-radius: 32px;
            color: white;
            font-weight: bold;
        }
        #endStats {
            background: rgba(0,0,0,0.5);
            padding: 16px;
            border-radius: 32px;
            margin: 16px 0;
            color: #0ff;
            font-weight: bold;
            text-align: center;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #0a0f1ecc;
            backdrop-filter: blur(16px);
            border-left: 5px solid cyan;
            padding: 12px 24px;
            border-radius: 60px;
            color: white;
            z-index: 200;
            font-weight: bold;
            pointer-events: none;
            animation: fadeUp 2s ease forwards;
        }
        @keyframes fadeUp { 0% { opacity: 0; transform: translateX(-50%) translateY(20px); } 15% { opacity: 1; transform: translateX(-50%) translateY(0); } 85% { opacity: 1; } 100% { opacity: 0; transform: translateX(-50%) translateY(-10px); } }
        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #00000099;
            border-radius: 40px;
            padding: 10px;
            cursor: pointer;
            z-index: 50;
            color: white;
            font-size: 1.4rem;
        }
        .mode-indicator {
            background: rgba(0,255,255,0.2);
            border-radius: 40px;
            padding: 5px 12px;
            font-size: 0.8rem;
            margin-left: 10px;
        }
        @media (max-width: 500px) { .cell { font-size: 2.6rem; } .btn { padding: 8px 14px; } .title { font-size: 1.8rem; } }
        .cell:focus-visible { outline: 2px solid cyan; transform: scale(1.02); }
        .btn:focus-visible { outline: 2px solid cyan; }
    </style>
</head>
<body data-theme="neon-blue">
    <canvas id="particleCanvas"></canvas>
    <div class="game-container">
        <!-- START MENU -->
        <div id="startMenu" class="menu-screen">
            <div class="title glow-text">⚡ ULTIMATE TIC TAC TOE ⚡</div>
            <div class="btn-group">
                <button id="vsAiBtn" class="btn btn-primary" aria-label="Play against AI">🤖 PLAY vs AI</button>
                <button id="twoPlayerBtn" class="btn" aria-label="Two players local">👥 2 PLAYERS</button>
            </div>
            <div class="difficulty-selector" style="display: flex; justify-content: space-between; align-items: center; gap: 10px; margin: 20px 0;">
                <span style="color:white;">🎯 Difficulty:</span>
                <select id="difficultySelect" aria-label="AI difficulty level">
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard">Hard</option>
                    <option value="impossible" selected>Impossible (Minimax)</option>
                </select>
            </div>
            <div class="btn-group">
                <button id="soundToggleBtn" class="btn" aria-label="Toggle sound">🔊 Sound ON</button>
                <button id="themeToggleBtn" class="btn" aria-label="Change theme">🎨 Neon Blue</button>
            </div>
            <div style="margin: 20px 0; text-align: center;">
                <button id="startPlayBtn" class="btn btn-primary" style="background:#0ff2; width:70%;" aria-label="Start game">▶ START GAME</button>
            </div>
        </div>

        <!-- GAME SCREEN -->
        <div id="gameScreen" class="game-screen hidden">
            <div class="info-panel">
                <div class="badge" id="turnIndicator" aria-live="polite">🎮 Turn: X</div>
                <div class="badge" id="scoreStat">🏆 W:0 L:0 D:0 | 0%</div>
                <button id="undoBtnGame" class="btn" style="padding:4px 12px;" aria-label="Undo last move">↩️ Undo</button>
                <button id="restartBtnGame" class="btn" style="padding:4px 12px;" aria-label="Restart game">🔄 Restart</button>
            </div>
            <div class="game-board" id="board" role="grid" aria-label="Tic Tac Toe board"></div>
            <div class="btn-group">
                <button id="newGameMenuBtn" class="btn" aria-label="Main menu">🏠 Main Menu</button>
                <button id="fullscreenBtnGame" class="btn" aria-label="Fullscreen mode">🖥️ Fullscreen</button>
            </div>
            <div class="history-panel" id="moveHistoryPanel" aria-live="polite">📜 Move history: </div>
        </div>

        <!-- END SCREEN -->
        <div id="endScreen" class="end-screen hidden">
            <div class="title" id="endWinnerMsg">🏆 Winner: X</div>
            <div class="stat-grid" id="endStats"></div>
            <div class="btn-group">
                <button id="playAgainBtn" class="btn btn-primary" aria-label="Play again">⚡ Play Again</button>
                <button id="mainMenuEndBtn" class="btn" aria-label="Main menu">🏠 Main Menu</button>
            </div>
        </div>
    </div>
    <div class="fullscreen-btn" id="globalFsBtn" aria-label="Toggle fullscreen">⛶</div>

    <script>
        // -------------------- GLOBALS --------------------
        let boardState = Array(9).fill(null);
        let currentPlayer = 'X';
        let gameMode = 'ai';         // 'ai' or 'twoPlayer'
        let aiDifficulty = 'impossible';
        let gameActive = true;
        let moveHistory = [];
        let statistics = { wins:0, losses:0, draws:0, gamesPlayed:0, winPercent:0 };
        let achievementsUnlocked = new Set();
        let soundEnabled = true;
        let currentTheme = 'neon-blue';
        let winnerInfo = null;
        let winLineCells = [];
        
        // DOM elements
        const startMenu = document.getElementById('startMenu');
        const gameScreen = document.getElementById('gameScreen');
        const endScreen = document.getElementById('endScreen');
        const boardDiv = document.getElementById('board');
        const turnIndicator = document.getElementById('turnIndicator');
        const scoreStatSpan = document.getElementById('scoreStat');
        const moveHistoryDiv = document.getElementById('moveHistoryPanel');
        const difficultySelect = document.getElementById('difficultySelect');
        const soundToggleBtn = document.getElementById('soundToggleBtn');
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const vsAiBtn = document.getElementById('vsAiBtn');
        const twoPlayerBtn = document.getElementById('twoPlayerBtn');
        const startPlayBtn = document.getElementById('startPlayBtn');
        
        // Mode selection highlighting
        function setActiveModeButton(mode) {
            if (mode === 'ai') {
                vsAiBtn.classList.add('btn-active');
                twoPlayerBtn.classList.remove('btn-active');
                twoPlayerBtn.classList.add('btn');
                vsAiBtn.classList.add('btn-primary');
            } else {
                twoPlayerBtn.classList.add('btn-active');
                vsAiBtn.classList.remove('btn-active');
                vsAiBtn.classList.add('btn');
                twoPlayerBtn.classList.add('btn-primary');
            }
        }
        
        vsAiBtn.onclick = () => { 
            gameMode = 'ai'; 
            setActiveModeButton('ai');
            playTone('click');
        };
        twoPlayerBtn.onclick = () => { 
            gameMode = 'twoPlayer'; 
            setActiveModeButton('twoPlayer');
            playTone('click');
        };
        
        // sounds
        let audioCtx = null;
        function playTone(type) {
            if(!soundEnabled) return;
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            let freq = 600;
            if(type === 'click') freq = 520;
            if(type === 'move') freq = 880;
            if(type === 'victory') freq = 1350;
            if(type === 'draw') freq = 420;
            osc.frequency.value = freq;
            gain.gain.value = 0.15;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
            osc.stop(audioCtx.currentTime + 0.25);
        }
        
        function loadStats() {
            const stored = localStorage.getItem('ttt_stats');
            if(stored) statistics = JSON.parse(stored);
            updateStatsUI();
        }
        function saveStats() {
            localStorage.setItem('ttt_stats', JSON.stringify(statistics));
        }
        function updateStatsUI() {
            const winPercent = statistics.gamesPlayed ? ((statistics.wins / statistics.gamesPlayed)*100).toFixed(0) : 0;
            scoreStatSpan.innerText = `🏆 W:${statistics.wins} L:${statistics.losses} D:${statistics.draws} | ${winPercent}%`;
            statistics.winPercent = winPercent;
        }
        function updateGameStatsAfterGame(winner) {
            statistics.gamesPlayed++;
            if(winner === 'X') { statistics.wins++; saveStats(); updateStatsUI(); checkAchievements('win'); }
            else if(winner === 'O') { 
                statistics.losses++; 
                saveStats(); updateStatsUI(); 
            }
            else { statistics.draws++; saveStats(); updateStatsUI(); checkAchievements('draw'); }
            saveStats();
            updateStatsUI();
        }
        
        function checkAchievements(trigger) {
            let totalWins = statistics.wins;
            if(!achievementsUnlocked.has('first_win') && totalWins>=1) { unlockAchievement('🏆 First Victory', 'first_win'); }
            if(!achievementsUnlocked.has('5_wins') && totalWins>=5) { unlockAchievement('🔥 5 Wins Champion', '5_wins'); }
            if(!achievementsUnlocked.has('10_wins') && totalWins>=10) { unlockAchievement('💎 Legendary 10 Wins', '10_wins'); }
            if(!achievementsUnlocked.has('unbeatable') && gameMode==='ai' && aiDifficulty==='impossible' && winnerInfo?.winner==='X') {
                unlockAchievement('👑 Unbeatable Champion', 'unbeatable');
            }
            if(trigger === 'win' && statistics.wins >= 3 && !achievementsUnlocked.has('streak_3')) {
                unlockAchievement('⚡ Winning Streak (3+ wins)', 'streak_3');
            }
        }
        
        function unlockAchievement(title, id) {
            if(achievementsUnlocked.has(id)) return;
            achievementsUnlocked.add(id);
            showToast(`✨ ACHIEVEMENT: ${title} ✨`, 3000);
            playTone('victory');
        }
        
        function showToast(msg, duration=2500) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(()=> toast.remove(), duration);
        }
        
        function renderBoard() {
            const cells = document.querySelectorAll('.cell');
            for(let i=0;i<9;i++) {
                cells[i].innerText = boardState[i] || '';
                if(boardState[i]==='X') cells[i].classList.add('x-move');
                else if(boardState[i]==='O') cells[i].classList.add('o-move');
                else cells[i].classList.remove('x-move','o-move');
            }
            if(winLineCells && winLineCells.length) {
                winLineCells.forEach(idx => {
                    const cellDiv = cells[idx];
                    if(cellDiv) cellDiv.style.background = 'radial-gradient(circle, rgba(0,255,255,0.5), transparent)';
                });
            } else {
                cells.forEach(c=> c.style.background = '');
            }
        }
        
        function checkWinner(board) {
            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let line of lines){
                const [a,b,c] = line;
                if(board[a] && board[a]===board[b] && board[a]===board[c]) return { winner: board[a], line };
            }
            if(board.every(cell=>cell!==null)) return { winner: 'draw', line: null };
            return null;
        }
        
        function endGame(winnerData) {
            if(!gameActive) return;
            gameActive = false;
            winnerInfo = winnerData;
            if(winnerData.winner !== 'draw') {
                winLineCells = winnerData.line;
                playTone('victory');
                showConfetti();
            } else { playTone('draw'); showToast("It's a Draw!",2000); }
            updateGameStatsAfterGame(winnerData.winner === 'draw' ? null : winnerData.winner);
            renderBoard();
            startMenu.classList.add('hidden');
            gameScreen.classList.add('hidden');
            endScreen.classList.remove('hidden');
            const endMsg = winnerData.winner === 'draw' ? "🤝 DRAW!" : `🏆 WINNER: ${winnerData.winner}`;
            document.getElementById('endWinnerMsg').innerHTML = endMsg;
            const statsHtml = `<div>🏅 Wins:${statistics.wins}  ❌ Losses:${statistics.losses}  🤝 Draws:${statistics.draws}</div><div>📊 Games:${statistics.gamesPlayed}  📈 Win%:${statistics.winPercent}%</div>`;
            document.getElementById('endStats').innerHTML = statsHtml;
        }
        
        function makeMove(index, player) {
            if(!gameActive || boardState[index] !== null) return false;
            boardState[index] = player;
            moveHistory.push({index, player});
            updateHistoryPanel();
            renderBoard();
            playTone('move');
            if(navigator.vibrate && window.innerWidth<800) navigator.vibrate(30);
            const winCheck = checkWinner(boardState);
            if(winCheck) {
                endGame(winCheck);
                return true;
            }
            currentPlayer = (currentPlayer === 'X') ? 'O' : 'X';
            turnIndicator.innerText = `🎮 Turn: ${currentPlayer}`;
            return true;
        }
        
        function undoMove() {
            if(!gameActive) return;
            if(moveHistory.length === 0) return;
            const last = moveHistory.pop();
            boardState[last.index] = null;
            currentPlayer = last.player;
            turnIndicator.innerText = `🎮 Turn: ${currentPlayer}`;
            winLineCells = [];
            renderBoard();
            gameActive = true;
            updateHistoryPanel();
            playTone('click');
        }
        
        function updateHistoryPanel() {
            if(moveHistory.length===0) moveHistoryDiv.innerText = '📜 Move history: none';
            else {
                let histStr = moveHistory.map((m,idx)=> `${idx+1}:${m.player}→${m.index+1}`).join(' · ');
                moveHistoryDiv.innerText = `📜 ${histStr}`;
            }
        }
        
        function resetGameBoard() {
            boardState = Array(9).fill(null);
            moveHistory = [];
            currentPlayer = 'X';
            gameActive = true;
            winnerInfo = null;
            winLineCells = [];
            renderBoard();
            turnIndicator.innerText = `🎮 Turn: X`;
            updateHistoryPanel();
            if(gameMode === 'ai' && currentPlayer === 'O') setTimeout(()=> aiMove(), 50);
        }
        
        function aiMove() {
            if(!gameActive || currentPlayer !== 'O' || gameMode !== 'ai') return;
            let empty = boardState.map((val,idx)=> val===null ? idx : null).filter(v=>v!==null);
            if(empty.length===0) return;
            let moveIdx = -1;
            if(aiDifficulty === 'easy') {
                let rand = Math.floor(Math.random()*empty.length);
                moveIdx = empty[rand];
            } else if(aiDifficulty === 'medium') {
                moveIdx = getBestMove(false);
            } else if(aiDifficulty === 'hard') {
                moveIdx = getBestMove(true);
            } else {
                const result = minimax(boardState, 'O');
                if(result && result.index !== undefined) moveIdx = result.index;
                else moveIdx = getBestMove(true);
            }
            if(moveIdx !== -1 && moveIdx !== undefined) makeMove(moveIdx, 'O');
        }
        
        function getBestMove(offensive=true) {
            let best = null;
            for(let i=0;i<9;i++) {
                if(boardState[i]===null){
                    let boardCopy = [...boardState];
                    boardCopy[i] = 'O';
                    if(checkWinner(boardCopy)?.winner === 'O') return i;
                    boardCopy[i] = 'X';
                    if(checkWinner(boardCopy)?.winner === 'X') best = i;
                }
            }
            if(best !== null) return best;
            if(boardState[4]===null) return 4;
            const corners = [0,2,6,8];
            for(let c of corners) if(boardState[c]===null) return c;
            for(let i=0;i<9;i++) if(boardState[i]===null) return i;
            return -1;
        }
        
        function minimax(board, player) {
            const winnerCheck = checkWinner(board);
            if(winnerCheck) {
                if(winnerCheck.winner === 'X') return { score: -10 };
                if(winnerCheck.winner === 'O') return { score: 10 };
                if(winnerCheck.winner === 'draw') return { score: 0 };
            }
            let moves = [];
            for(let i=0;i<9;i++){
                if(board[i]===null){
                    let newBoard = [...board];
                    newBoard[i] = player;
                    let result = minimax(newBoard, player==='O' ? 'X' : 'O');
                    moves.push({ index: i, score: result.score });
                }
            }
            if(moves.length===0) return { score: 0 };
            if(player === 'O'){
                let best = moves.reduce((best,m)=> m.score > best.score ? m : best, moves[0]);
                return best;
            } else {
                let best = moves.reduce((best,m)=> m.score < best.score ? m : best, moves[0]);
                return best;
            }
        }
        
        function onCellClick(idx){
            if(!gameActive) return;
            if(boardState[idx] !== null) return;
            if(gameMode === 'twoPlayer') {
                makeMove(idx, currentPlayer);
            } else if(gameMode === 'ai') {
                if(currentPlayer === 'X') {
                    if(makeMove(idx, 'X')) {
                        setTimeout(()=> aiMove(), 80);
                    }
                }
            }
        }
        
        function buildBoardUI() {
            boardDiv.innerHTML = '';
            for(let i=0;i<9;i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.setAttribute('aria-label', `cell ${i+1}`);
                cell.setAttribute('role', 'button');
                cell.setAttribute('tabindex', '0');
                cell.addEventListener('click', (e)=> { e.stopPropagation(); onCellClick(i); });
                cell.addEventListener('keydown', (e) => { if(e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onCellClick(i); } });
                boardDiv.appendChild(cell);
            }
            renderBoard();
        }
        
        function initGame(mode, diff) {
            gameMode = mode;
            aiDifficulty = diff;
            resetGameBoard();
            startMenu.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            endScreen.classList.add('hidden');
            gameActive = true;
            // Show mode in turn indicator
            const modeText = gameMode === 'ai' ? '🤖 vs AI' : '👥 2P Mode';
            turnIndicator.innerText = `🎮 ${modeText} | Turn: X`;
            if(gameMode === 'ai' && currentPlayer === 'O') setTimeout(()=> aiMove(), 150);
        }
        
        function setTheme(theme) {
            currentTheme = theme;
            document.body.setAttribute('data-theme', theme);
            const themeNames = { 'neon-blue':'Neon Green', 'neon-green':'Purple', 'purple':'Neon Blue' };
            themeToggleBtn.innerText = `🎨 ${themeNames[theme]}`;
            const nextTheme = { 'neon-blue':'neon-green','neon-green':'purple','purple':'neon-blue' };
            themeToggleBtn.onclick = ()=> setTheme(nextTheme[currentTheme]);
        }
        
        soundToggleBtn.onclick = ()=>{ soundEnabled = !soundEnabled; soundToggleBtn.innerText = soundEnabled ? "🔊 Sound ON" : "🔇 Sound OFF"; playTone('click'); };
        
        startPlayBtn.onclick = ()=>{
            let diff = difficultySelect.value;
            initGame(gameMode, diff);
            playTone('click');
        };
        
        document.getElementById('undoBtnGame').onclick = ()=> { if(gameScreen.classList.contains('hidden')) return; undoMove(); if(gameMode==='ai' && currentPlayer==='O' && gameActive) setTimeout(()=>aiMove(),40); };
        document.getElementById('restartBtnGame').onclick = ()=> { resetGameBoard(); if(gameMode==='ai' && currentPlayer==='O') setTimeout(()=>aiMove(),50); };
        document.getElementById('newGameMenuBtn').onclick = ()=>{ startMenu.classList.remove('hidden'); gameScreen.classList.add('hidden'); endScreen.classList.add('hidden'); };
        document.getElementById('playAgainBtn').onclick = ()=>{ initGame(gameMode, aiDifficulty); };
        document.getElementById('mainMenuEndBtn').onclick = ()=>{ startMenu.classList.remove('hidden'); gameScreen.classList.add('hidden'); endScreen.classList.add('hidden'); };
        
        const fsBtn = document.getElementById('globalFsBtn');
        function toggleFullscreen(){ if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
        fsBtn.onclick = toggleFullscreen;
        document.getElementById('fullscreenBtnGame').onclick = toggleFullscreen;
        
        // Particle background
        const canvas = document.getElementById('particleCanvas');
        let ctxP = canvas.getContext('2d');
        let particles = [];
        function resizeCanvas(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize',resizeCanvas);
        function initParticles(){ for(let i=0;i<70;i++) particles.push({ x:Math.random()*canvas.width, y:Math.random()*canvas.height, radius:Math.random()*2+1, dx:(Math.random()-0.5)*0.5, dy:(Math.random()-0.5)*0.5, alpha:Math.random()*0.5+0.2 }); }
        function animateParticles(){
            if(!canvas) return;
            ctxP.clearRect(0,0,canvas.width,canvas.height);
            for(let p of particles){
                ctxP.beginPath();
                ctxP.arc(p.x,p.y,p.radius,0,Math.PI*2);
                ctxP.fillStyle = `rgba(0, 200, 255, ${p.alpha})`;
                ctxP.fill();
                p.x += p.dx; p.y += p.dy;
                if(p.x<0||p.x>canvas.width) p.dx*=-1;
                if(p.y<0||p.y>canvas.height) p.dy*=-1;
            }
            requestAnimationFrame(animateParticles);
        }
        resizeCanvas(); initParticles(); animateParticles();
        
        function showConfetti(){
            for(let i=0;i<60;i++){
                let conf = document.createElement('div');
                conf.style.position='fixed'; conf.style.width='8px'; conf.style.height='8px'; conf.style.background=`hsl(${Math.random()*360},100%,60%)`; conf.style.top='50%'; conf.style.left='50%'; conf.style.pointerEvents='none'; conf.style.zIndex='9999'; conf.style.borderRadius='2px';
                document.body.appendChild(conf);
                let angle = Math.random()*Math.PI*2;
                let vel = 5+Math.random()*8;
                let vx = Math.cos(angle)*vel;
                let vy = Math.sin(angle)*vel;
                let life = 100;
                let interval = setInterval(()=>{
                    let x = parseFloat(conf.style.left);
                    let y = parseFloat(conf.style.top);
                    conf.style.left = (x+vx)+'px';
                    conf.style.top = (y+vy)+'px';
                    vy+=0.3;
                    life--;
                    if(life<=0) { conf.remove(); clearInterval(interval); }
                },30);
                setTimeout(()=> conf.remove(), 2000);
            }
        }
        
        loadStats();
        buildBoardUI();
        setTheme('neon-blue');
        setActiveModeButton('ai');
    </script>
</body>
</html>
