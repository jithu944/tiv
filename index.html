<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>⚡ TIC TAC TOE · ULTIMATE</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0a0c16, #010101);
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    /* particle canvas background */
    #particleCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* main container — compact but clean */
    .game-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      margin: 0 auto;
      background: rgba(6, 14, 22, 0.8);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 0.9rem;
      box-shadow: 0 15px 35px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,255,255,0.25);
      transition: all 0.2s;
    }

    /* theme variants */
    body[data-theme="neon-blue"] .glow { text-shadow: 0 0 5px #0ff; }
    body[data-theme="neon-green"] .glow { text-shadow: 0 0 5px #0f6; }
    body[data-theme="purple"] .glow { text-shadow: 0 0 5px #c58aff; }
    body[data-theme="neon-blue"] .cell { box-shadow: 0 0 0 1px #0ff6; }
    body[data-theme="neon-green"] .cell { box-shadow: 0 0 0 1px #0f66; }
    body[data-theme="purple"] .cell { box-shadow: 0 0 0 1px #c084fc; }

    .screen { transition: opacity 0.25s ease; }
    .hidden { display: none !important; }

    /* titles */
    .title {
      font-size: 1.55rem;
      font-weight: 800;
      text-align: center;
      background: linear-gradient(135deg, #fff, #5bc0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.7rem;
      letter-spacing: -0.3px;
    }
    @media (max-width: 450px) { .title { font-size: 1.3rem; } }

    /* buttons */
    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin: 10px 0;
    }
    .btn {
      background: rgba(0, 20, 35, 0.9);
      border: 1px solid rgba(0, 255, 255, 0.5);
      padding: 6px 14px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.75rem;
      color: #f0f9ff;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:active { transform: scale(0.95); }
    .btn-primary {
      background: linear-gradient(105deg, #0bb, #099);
      border-color: #aff;
      box-shadow: 0 0 6px #0ff8;
    }
    .btn-active {
      background: linear-gradient(135deg, #0af, #0ff);
      border-color: white;
      box-shadow: 0 0 10px cyan;
    }
    select {
      background: #0a1428ee;
      border: 1px solid cyan;
      border-radius: 30px;
      padding: 5px 10px;
      color: white;
      font-weight: 500;
      font-size: 0.7rem;
    }

    /* game board - compact & responsive */
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 1.2rem;
      padding: 10px;
      margin: 8px 0;
    }
    .cell {
      aspect-ratio: 1 / 1;
      background: rgba(12, 20, 32, 0.95);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.05s linear;
    }
    .cell.x-move { color: #0ff; text-shadow: 0 0 10px cyan; animation: pop 0.1s ease; }
    .cell.o-move { color: #ffb347; text-shadow: 0 0 10px #ffaa44; animation: pop 0.1s ease; }
    @keyframes pop { 0% { transform: scale(0.85); } 100% { transform: scale(1); } }
    @media (max-width: 450px) {
      .cell { font-size: 1.9rem; border-radius: 14px; }
      .board { gap: 6px; padding: 6px; }
    }

    /* info panel compact */
    .info-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      background: rgba(0, 0, 0, 0.55);
      padding: 6px 12px;
      border-radius: 50px;
      margin-bottom: 6px;
    }
    .badge {
      background: #031020cc;
      border-radius: 30px;
      padding: 4px 10px;
      font-size: 0.7rem;
      font-weight: bold;
      color: white;
      border: 1px solid cyan;
    }
    .history {
      max-height: 70px;
      overflow-y: auto;
      background: #030b1890;
      border-radius: 18px;
      padding: 5px 8px;
      font-size: 0.6rem;
      color: #bbd4ff;
      margin-top: 6px;
    }
    .stat-card {
      background: rgba(0, 0, 0, 0.5);
      padding: 8px;
      border-radius: 20px;
      color: white;
      text-align: center;
      font-size: 0.7rem;
    }
    .toast {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: #0a0f1ee6;
      backdrop-filter: blur(16px);
      border-left: 3px solid cyan;
      padding: 6px 14px;
      border-radius: 40px;
      color: white;
      z-index: 200;
      font-weight: bold;
      font-size: 0.7rem;
      white-space: nowrap;
      animation: fadeOut 2s forwards;
      pointer-events: none;
    }
    @keyframes fadeOut {
      0% { opacity: 0; transform: translateX(-50%) translateY(15px); }
      15% { opacity: 1; transform: translateX(-50%) translateY(0); }
      85% { opacity: 1; }
      100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
    }
    .fs-btn {
      position: fixed;
      bottom: 12px;
      right: 12px;
      background: #000000aa;
      border-radius: 40px;
      padding: 5px 10px;
      cursor: pointer;
      z-index: 60;
      color: white;
      font-size: 0.9rem;
      backdrop-filter: blur(8px);
    }
    @media (min-width: 700px) {
      .game-card { max-width: 480px; padding: 1rem; }
      .cell { font-size: 3rem; }
    }
  </style>
</head>
<body data-theme="neon-blue">
  <canvas id="particleCanvas"></canvas>
  <div class="game-card">
    <!-- START MENU -->
    <div id="startMenu" class="screen">
      <div class="title glow">⚡ ULTIMATE TIC TAC TOE ⚡</div>
      <div class="btn-group">
        <button id="vsAiBtn" class="btn btn-primary">🤖 VS AI</button>
        <button id="twoPlayerBtn" class="btn">👥 2P</button>
      </div>
      <div style="display: flex; justify-content: space-between; align-items: center; gap: 10px; margin: 12px 8px;">
        <span style="color:white; font-size:0.7rem;">🎯 Diff:</span>
        <select id="difficultySelect">
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
          <option value="impossible" selected>Impossible</option>
        </select>
      </div>
      <div class="btn-group">
        <button id="soundToggleBtn" class="btn">🔊 ON</button>
        <button id="themeToggleBtn" class="btn">🎨 Blue</button>
      </div>
      <div style="margin: 10px 0 4px; text-align: center;">
        <button id="startPlayBtn" class="btn btn-primary" style="width:75%;">▶ START</button>
      </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="gameScreen" class="screen hidden">
      <div class="info-bar">
        <div class="badge" id="turnIndicator">🎮 X</div>
        <div class="badge" id="scoreStat">🏆 0-0-0</div>
        <button id="undoBtnGame" class="btn" style="padding:3px 8px;">↩️</button>
        <button id="restartBtnGame" class="btn" style="padding:3px 8px;">🔄</button>
      </div>
      <div class="board" id="board"></div>
      <div class="btn-group">
        <button id="newGameMenuBtn" class="btn">🏠 Menu</button>
        <button id="fullscreenBtnGame" class="btn">⛶ Full</button>
      </div>
      <div class="history" id="moveHistoryPanel">📜 moves: —</div>
    </div>

    <!-- END SCREEN -->
    <div id="endScreen" class="screen hidden">
      <div class="title" id="endWinnerMsg">🏆 Winner</div>
      <div class="stat-card" id="endStats"></div>
      <div class="btn-group">
        <button id="playAgainBtn" class="btn btn-primary">⚡ Again</button>
        <button id="mainMenuEndBtn" class="btn">🏠 Menu</button>
      </div>
    </div>
  </div>
  <div class="fs-btn" id="globalFsBtn">⛶</div>

  <script>
    // ---------- GLOBALS ----------
    let board = Array(9).fill(null);
    let current = 'X';
    let gameMode = 'ai';
    let aiDiff = 'impossible';
    let active = true;
    let history = [];
    let stats = { wins:0, losses:0, draws:0, games:0 };
    let achievements = new Set();
    let sound = true;
    let winLine = [];
    let winnerData = null;

    // DOM
    const startDiv = document.getElementById('startMenu');
    const gameDiv = document.getElementById('gameScreen');
    const endDiv = document.getElementById('endScreen');
    const boardEl = document.getElementById('board');
    const turnSpan = document.getElementById('turnIndicator');
    const scoreSpan = document.getElementById('scoreStat');
    const historyDiv = document.getElementById('moveHistoryPanel');
    const diffSelect = document.getElementById('difficultySelect');
    const soundBtn = document.getElementById('soundToggleBtn');
    const themeBtn = document.getElementById('themeToggleBtn');
    const vsAi = document.getElementById('vsAiBtn');
    const twoP = document.getElementById('twoPlayerBtn');
    const startBtn = document.getElementById('startPlayBtn');

    // Audio (pure js)
    let audioCtx = null;
    function beep(type) {
      if (!sound) return;
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      let freq = type === 'click' ? 500 : type === 'move' ? 860 : type === 'victory' ? 1300 : 400;
      osc.frequency.value = freq;
      gain.gain.value = 0.1;
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);
      osc.stop(audioCtx.currentTime + 0.2);
    }

    // stats localstorage
    function loadStats() {
      const stored = localStorage.getItem('ttt_stats');
      if (stored) stats = JSON.parse(stored);
      updateUIStats();
    }
    function saveStats() { localStorage.setItem('ttt_stats', JSON.stringify(stats)); }
    function updateUIStats() {
      let percent = stats.games ? ((stats.wins / stats.games) * 100).toFixed(0) : 0;
      scoreSpan.innerText = `🏆 ${stats.wins}-${stats.losses}-${stats.draws} | ${percent}%`;
    }
    function updateStatsAfterGame(winner) {
      stats.games++;
      if (winner === 'X') { stats.wins++; checkAchieve(); }
      else if (winner === 'O') { stats.losses++; }
      else { stats.draws++; }
      saveStats();
      updateUIStats();
    }

    function toast(msg, dur = 2000) {
      let t = document.createElement('div');
      t.className = 'toast';
      t.innerText = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), dur);
    }
    function unlockAchieve(title, id) {
      if (achievements.has(id)) return;
      achievements.add(id);
      toast(`✨ ${title} ✨`, 2200);
      beep('victory');
    }
    function checkAchieve() {
      let w = stats.wins;
      if (!achievements.has('first') && w >= 1) unlockAchieve('First Victory', 'first');
      if (!achievements.has('5w') && w >= 5) unlockAchieve('5 Wins Champion', '5w');
      if (!achievements.has('10w') && w >= 10) unlockAchieve('Legendary 10 Wins', '10w');
      if (!achievements.has('unbeatable') && gameMode === 'ai' && aiDiff === 'impossible' && winnerData?.winner === 'X') {
        unlockAchieve('Unbeatable Champion', 'unbeatable');
      }
    }

    function confettiBurst() {
      for (let i=0;i<35;i++) {
        let conf = document.createElement('div');
        conf.style.position = 'fixed';
        conf.style.width = '6px';
        conf.style.height = '6px';
        conf.style.background = `hsl(${Math.random()*360}, 100%, 60%)`;
        conf.style.top = '45%';
        conf.style.left = '50%';
        conf.style.pointerEvents = 'none';
        conf.style.zIndex = '9999';
        conf.style.borderRadius = '2px';
        document.body.appendChild(conf);
        let ang = Math.random() * Math.PI * 2;
        let vel = 3 + Math.random() * 6;
        let vx = Math.cos(ang)*vel, vy = Math.sin(ang)*vel;
        let life = 70;
        let iv = setInterval(() => {
          let x = parseFloat(conf.style.left), y = parseFloat(conf.style.top);
          conf.style.left = (x+vx)+'px';
          conf.style.top = (y+vy)+'px';
          vy += 0.2;
          life--;
          if (life <= 0) { conf.remove(); clearInterval(iv); }
        }, 20);
        setTimeout(() => conf.remove(), 1400);
      }
    }

    function checkWinner(boardArr) {
      const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
      for (let l of lines) {
        let [a,b,c] = l;
        if (boardArr[a] && boardArr[a] === boardArr[b] && boardArr[a] === boardArr[c]) return { winner: boardArr[a], line: l };
      }
      if (boardArr.every(v => v !== null)) return { winner: 'draw', line: null };
      return null;
    }

    function render() {
      let cells = document.querySelectorAll('.cell');
      for (let i=0;i<9;i++) {
        cells[i].innerText = board[i] || '';
        if (board[i] === 'X') cells[i].classList.add('x-move');
        else if (board[i] === 'O') cells[i].classList.add('o-move');
        else cells[i].classList.remove('x-move','o-move');
        cells[i].style.background = '';
      }
      if (winLine.length) {
        winLine.forEach(idx => { let c = document.querySelectorAll('.cell')[idx]; if(c) c.style.background = 'radial-gradient(circle, rgba(0,255,200,0.5), transparent)'; });
      }
    }

    function endGame(winObj) {
      if (!active) return;
      active = false;
      winnerData = winObj;
      if (winObj.winner !== 'draw') {
        winLine = winObj.line;
        beep('victory');
        confettiBurst();
      } else { beep('draw'); toast("🤝 Draw!"); }
      updateStatsAfterGame(winObj.winner === 'draw' ? null : winObj.winner);
      render();
      startDiv.classList.add('hidden');
      gameDiv.classList.add('hidden');
      endDiv.classList.remove('hidden');
      let msg = winObj.winner === 'draw' ? "🤝 DRAW!" : `🏆 WINNER: ${winObj.winner}`;
      document.getElementById('endWinnerMsg').innerHTML = msg;
      let perc = stats.games ? ((stats.wins/stats.games)*100).toFixed(0) : 0;
      document.getElementById('endStats').innerHTML = `<div>🏅 W:${stats.wins}  L:${stats.losses}  D:${stats.draws}</div><div>📊 Games:${stats.games}  📈 Win%:${perc}%</div>`;
    }

    function makeMove(idx, player) {
      if (!active || board[idx] !== null) return false;
      board[idx] = player;
      history.push({ idx, player });
      render();
      beep('move');
      if (navigator.vibrate && window.innerWidth < 700) navigator.vibrate(12);
      let win = checkWinner(board);
      if (win) { endGame(win); return true; }
      current = current === 'X' ? 'O' : 'X';
      let modeLabel = gameMode === 'ai' ? '🤖 AI' : '👥 2P';
      turnSpan.innerText = `🎮 ${modeLabel} | ${current}`;
      updateHistoryUI();
      return true;
    }

    function updateHistoryUI() {
      if (history.length === 0) historyDiv.innerText = '📜 moves: —';
      else {
        let str = history.map((m,i)=>`${i+1}:${m.player}`).join(' · ');
        historyDiv.innerText = `📜 ${str}`;
      }
    }

    function undo() {
      if (!active || history.length === 0) return;
      let last = history.pop();
      board[last.idx] = null;
      current = last.player;
      winLine = [];
      render();
      active = true;
      let modeLabel = gameMode === 'ai' ? '🤖 AI' : '👥 2P';
      turnSpan.innerText = `🎮 ${modeLabel} | ${current}`;
      updateHistoryUI();
      beep('click');
      if (gameMode === 'ai' && current === 'O' && active) setTimeout(() => aiTurn(), 20);
    }

    function resetBoard() {
      board = Array(9).fill(null);
      history = [];
      current = 'X';
      active = true;
      winLine = [];
      winnerData = null;
      render();
      let modeLabel = gameMode === 'ai' ? '🤖 AI' : '👥 2P';
      turnSpan.innerText = `🎮 ${modeLabel} | X`;
      updateHistoryUI();
      if (gameMode === 'ai' && current === 'O') setTimeout(() => aiTurn(), 40);
    }

    // AI helpers
    function getBlockWinMove() {
      for (let i=0;i<9;i++) {
        if (board[i] === null) {
          let copy = [...board];
          copy[i] = 'O';
          if (checkWinner(copy)?.winner === 'O') return i;
          copy = [...board];
          copy[i] = 'X';
          if (checkWinner(copy)?.winner === 'X') return i;
        }
      }
      return null;
    }
    function minimax(b, player) {
      let w = checkWinner(b);
      if (w) {
        if (w.winner === 'X') return { score: -10 };
        if (w.winner === 'O') return { score: 10 };
        if (w.winner === 'draw') return { score: 0 };
      }
      let moves = [];
      for (let i=0;i<9;i++) {
        if (b[i] === null) {
          let newB = [...b];
          newB[i] = player;
          let result = minimax(newB, player === 'O' ? 'X' : 'O');
          moves.push({ idx: i, score: result.score });
        }
      }
      if (moves.length === 0) return { score: 0 };
      if (player === 'O') return moves.reduce((a,b)=> a.score > b.score ? a : b);
      else return moves.reduce((a,b)=> a.score < b.score ? a : b);
    }

    function aiTurn() {
      if (!active || current !== 'O' || gameMode !== 'ai') return;
      let empty = board.map((v,i)=> v===null ? i : null).filter(v=>v!==null);
      if (empty.length === 0) return;
      let move = -1;
      if (aiDiff === 'easy') move = empty[Math.floor(Math.random() * empty.length)];
      else if (aiDiff === 'medium') {
        let block = getBlockWinMove();
        move = block !== null ? block : (board[4]===null ? 4 : empty[0]);
      } else if (aiDiff === 'hard') {
        let block = getBlockWinMove();
        move = block !== null ? block : (board[4]===null ? 4 : empty[Math.floor(Math.random()*empty.length)]);
      } else {
        let best = minimax(board, 'O');
        move = best.idx !== undefined ? best.idx : getBlockWinMove();
        if (move === null) move = board[4]===null ? 4 : empty[0];
      }
      if (move !== -1) makeMove(move, 'O');
    }

    function cellClick(idx) {
      if (!active || board[idx] !== null) return;
      if (gameMode === 'twoPlayer') makeMove(idx, current);
      else if (gameMode === 'ai' && current === 'X') {
        if (makeMove(idx, 'X')) setTimeout(() => aiTurn(), 50);
      }
    }

    function buildBoard() {
      boardEl.innerHTML = '';
      for (let i=0;i<9;i++) {
        let c = document.createElement('div');
        c.className = 'cell';
        c.setAttribute('role', 'button');
        c.addEventListener('click', () => cellClick(i));
        c.addEventListener('keydown', (e) => { if(e.key==='Enter'||e.key===' ') { e.preventDefault(); cellClick(i); } });
        boardEl.appendChild(c);
      }
      render();
    }

    function initGame(mode, diff) {
      gameMode = mode;
      aiDiff = diff;
      resetBoard();
      startDiv.classList.add('hidden');
      gameDiv.classList.remove('hidden');
      endDiv.classList.add('hidden');
      active = true;
      let modeLabel = gameMode === 'ai' ? '🤖 AI' : '👥 2P';
      turnSpan.innerText = `🎮 ${modeLabel} | X`;
      if (gameMode === 'ai' && current === 'O') setTimeout(() => aiTurn(), 60);
    }

    // UI handlers
    function setActiveButton(mode) {
      if (mode === 'ai') { vsAi.classList.add('btn-active'); twoP.classList.remove('btn-active'); }
      else { twoP.classList.add('btn-active'); vsAi.classList.remove('btn-active'); }
    }
    vsAi.onclick = () => { gameMode = 'ai'; setActiveButton('ai'); beep('click'); };
    twoP.onclick = () => { gameMode = 'twoPlayer'; setActiveButton('twoPlayer'); beep('click'); };
    startBtn.onclick = () => { initGame(gameMode, diffSelect.value); beep('click'); };
    document.getElementById('undoBtnGame').onclick = () => { if (!gameDiv.classList.contains('hidden')) undo(); };
    document.getElementById('restartBtnGame').onclick = () => { if (!gameDiv.classList.contains('hidden')) resetBoard(); };
    document.getElementById('newGameMenuBtn').onclick = () => { startDiv.classList.remove('hidden'); gameDiv.classList.add('hidden'); endDiv.classList.add('hidden'); };
    document.getElementById('playAgainBtn').onclick = () => initGame(gameMode, aiDiff);
    document.getElementById('mainMenuEndBtn').onclick = () => { startDiv.classList.remove('hidden'); gameDiv.classList.add('hidden'); endDiv.classList.add('hidden'); };
    const fsGlobal = document.getElementById('globalFsBtn');
    const fsGame = document.getElementById('fullscreenBtnGame');
    function toggleFs() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
    fsGlobal.onclick = toggleFs;
    if(fsGame) fsGame.onclick = toggleFs;

    // theme & sound
    let themeIdx = 0;
    const themes = ['neon-blue', 'neon-green', 'purple'];
    const themeNames = { 'neon-blue':'Green', 'neon-green':'Purple', 'purple':'Blue' };
    function cycleTheme() {
      let next = themes[(themes.indexOf(currentTheme)+1)%themes.length];
      setTheme(next);
    }
    function setTheme(theme) {
      currentTheme = theme;
      document.body.setAttribute('data-theme', theme);
      themeBtn.innerText = `🎨 ${themeNames[theme]}`;
    }
    let currentTheme = 'neon-blue';
    soundBtn.onclick = () => { sound = !sound; soundBtn.innerText = sound ? "🔊 ON" : "🔇 OFF"; beep('click'); };
    themeBtn.onclick = () => cycleTheme();
    setTheme('neon-blue');
    setActiveButton('ai');
    loadStats();
    buildBoard();

    // particles background
    const canv = document.getElementById('particleCanvas');
    let pCtx = canv.getContext('2d');
    let particles = [];
    function resizeCanv() { canv.width = window.innerWidth; canv.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanv);
    function initParticles() { for(let i=0;i<40;i++) particles.push({ x:Math.random()*canv.width, y:Math.random()*canv.height, r:Math.random()*2+1, dx:(Math.random()-0.5)*0.4, dy:(Math.random()-0.5)*0.4, a:Math.random()*0.5+0.2 }); }
    function animateParticles() {
      if(!canv) return;
      pCtx.clearRect(0,0,canv.width,canv.height);
      for(let p of particles) {
        pCtx.beginPath();
        pCtx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        pCtx.fillStyle = `rgba(0, 210, 255, ${p.a})`;
        pCtx.fill();
        p.x += p.dx; p.y += p.dy;
        if(p.x<0||p.x>canv.width) p.dx*=-1;
        if(p.y<0||p.y>canv.height) p.dy*=-1;
      }
      requestAnimationFrame(animateParticles);
    }
    resizeCanv(); initParticles(); animateParticles();
  </script>
</body>
</html>
